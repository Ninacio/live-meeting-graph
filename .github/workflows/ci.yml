name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Unit tests
        run: python -m pytest -q
      - name: Mock eval (deterministic pipeline regression guard)
        run: python eval/run_eval.py --mock --min-f1 0.99
      - name: End-to-end CLI smoke run
        run: python cli.py samples/product_meeting.txt --mock --no-db

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
